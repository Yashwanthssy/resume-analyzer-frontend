<div class="history-container">
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Analysis History</h1>
      <p class="page-subtitle">Your past resume analyses</p>
    </div>
    <div class="header-badge" *ngIf="!isLoading() && historyItems().length > 0">
      <span class="badge-count">{{ historyItems().length }}</span>
      <span class="badge-label">Total</span>
    </div>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage()" class="error-alert animate-fade-up">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="8" x2="12" y2="12"></line>
      <line x1="12" y1="16" x2="12.01" y2="16"></line>
    </svg>
    <span>{{ errorMessage() }}</span>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading()" class="loading-grid">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="skeleton-header"></div>
      <div class="skeleton-title"></div>
      <div class="skeleton-score"></div>
      <div class="skeleton-badge"></div>
      <div class="skeleton-footer"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading() && historyItems().length === 0" class="empty-state animate-scale-in">
    <div class="empty-illustration">
      <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M20 7h-3a2 2 0 0 1-2-2V2"></path>
        <path d="M9 18a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7l4 4v10a2 2 0 0 1-2 2Z"></path>
        <path d="M3 7.6v12.8A1.6 1.6 0 0 0 4.6 22h9.8"></path>
      </svg>
    </div>
    <h2 class="empty-title">No analyses yet</h2>
    <p class="empty-text">Upload your first resume to get started</p>
    <a routerLink="/analyzer" class="cta-button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/>
      </svg>
      Analyze Resume
    </a>
  </div>

  <!-- History Grid -->
  <div *ngIf="!isLoading() && historyItems().length > 0" class="history-grid">
    <div *ngFor="let item of historyItems(); let i = index" 
         class="history-card animate-fade-up"
         [style.animation-delay.ms]="i * 50"
         (click)="viewDetails(item.id)">
      <div class="card-header">
        <div class="file-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </div>
        <button class="delete-btn" (click)="deleteItem(item.id, $event)" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>

      <h3 class="file-name">{{ item.fileName }}</h3>

      <div class="score-display">
        <span class="score-number" [ngClass]="getScoreColor(item.score)">{{ item.score }}</span>
        <span class="score-label">Match Score</span>
      </div>

      <div class="verdict-badge" [ngClass]="getVerdictClass(item.score)">
        {{ getVerdict(item.score) }}
      </div>

      <div class="card-footer">
        <span class="date">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          {{ formatDate(item.createdAt) }}
        </span>
        <button class="view-btn">
          View Details
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
